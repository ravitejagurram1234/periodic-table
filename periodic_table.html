<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Periodic Table of Elements</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --border: #1e1e2e;
    --text: #e8e8f0;
    --muted: #6b6b8a;
    --accent: #7c3aed;

    --alkali: #ff4757;
    --alkaline: #ff6b35;
    --lanthanide: #ffa502;
    --actinide: #eccc68;
    --transition: #2ed573;
    --post-transition: #1e90ff;
    --metalloid: #a29bfe;
    --nonmetal: #fd79a8;
    --halogen: #00cec9;
    --noble: #e17055;
    --unknown: #636e72;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Space Mono', monospace;
    min-height: 100vh;
    overflow-x: auto;
    padding: 20px;
  }

  h1 {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: clamp(1.2rem, 3vw, 2rem);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: #fff;
    text-align: center;
    margin-bottom: 6px;
  }

  .subtitle {
    text-align: center;
    font-size: 0.7rem;
    color: var(--muted);
    letter-spacing: 0.2em;
    margin-bottom: 20px;
  }

  /* Legend */
  .legend {
    display: flex;
    flex-wrap: wrap;
    gap: 6px 12px;
    justify-content: center;
    margin-bottom: 18px;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 0.6rem;
    color: var(--muted);
    cursor: pointer;
    transition: color 0.2s;
  }
  .legend-item:hover { color: var(--text); }
  .legend-dot {
    width: 8px; height: 8px;
    border-radius: 2px;
    flex-shrink: 0;
  }

  /* Table */
  .pt-wrapper {
    overflow-x: auto;
    padding-bottom: 10px;
  }

  .pt-grid {
    display: grid;
    grid-template-columns: repeat(18, 52px);
    grid-template-rows: repeat(10, 52px);
    gap: 3px;
    min-width: fit-content;
    margin: 0 auto;
    width: fit-content;
  }

  /* Element cell */
  .el {
    position: relative;
    border-radius: 5px;
    cursor: pointer;
    border: 1px solid transparent;
    transition: transform 0.15s, border-color 0.15s, box-shadow 0.15s;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2px;
    overflow: hidden;
  }
  .el::before {
    content: '';
    position: absolute;
    inset: 0;
    opacity: 0.18;
    border-radius: 4px;
    background: currentColor;
  }
  .el:hover {
    transform: scale(1.15) translateZ(0);
    z-index: 10;
    border-color: currentColor;
    box-shadow: 0 0 16px currentColor;
  }
  .el:hover::before { opacity: 0.35; }

  .el .num {
    font-size: 0.45rem;
    line-height: 1;
    color: inherit;
    opacity: 0.7;
    align-self: flex-start;
    padding-left: 3px;
  }
  .el .sym {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 1rem;
    line-height: 1;
    color: inherit;
  }
  .el .name {
    font-size: 0.3rem;
    color: inherit;
    opacity: 0.7;
    text-align: center;
    line-height: 1.2;
  }
  .el .mass {
    font-size: 0.3rem;
    color: inherit;
    opacity: 0.5;
  }

  /* Category colors */
  .alkali        { color: var(--alkali); }
  .alkaline      { color: var(--alkaline); }
  .lanthanide    { color: var(--lanthanide); }
  .actinide      { color: var(--actinide); }
  .transition    { color: var(--transition); }
  .post-trans    { color: var(--post-transition); }
  .metalloid     { color: var(--metalloid); }
  .nonmetal      { color: var(--nonmetal); }
  .halogen       { color: var(--halogen); }
  .noble         { color: var(--noble); }
  .unknown       { color: var(--unknown); }

  /* Period & group labels */
  .label {
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.55rem;
    color: var(--muted);
    font-family: 'Space Mono', monospace;
  }

  /* Placeholder cell (La/Ac series) */
  .placeholder {
    border-radius: 5px;
    background: transparent;
    border: 1px dashed var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.45rem;
    color: var(--muted);
    cursor: default;
  }

  /* Modal */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.8);
    backdrop-filter: blur(6px);
    z-index: 100;
    align-items: center;
    justify-content: center;
  }
  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 32px;
    max-width: 420px;
    width: 90%;
    position: relative;
    animation: pop 0.2s cubic-bezier(0.34,1.56,0.64,1);
  }
  @keyframes pop {
    from { transform: scale(0.85); opacity: 0; }
    to   { transform: scale(1);    opacity: 1; }
  }

  .modal-close {
    position: absolute;
    top: 16px; right: 16px;
    background: none; border: none;
    color: var(--muted);
    font-size: 1.2rem;
    cursor: pointer;
    line-height: 1;
    transition: color 0.2s;
  }
  .modal-close:hover { color: var(--text); }

  .modal-symbol {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 4rem;
    line-height: 1;
    margin-bottom: 4px;
  }
  .modal-num {
    font-size: 0.7rem;
    color: var(--muted);
    margin-bottom: 2px;
  }
  .modal-name {
    font-family: 'Syne', sans-serif;
    font-weight: 600;
    font-size: 1.4rem;
    margin-bottom: 2px;
  }
  .modal-category {
    font-size: 0.6rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    opacity: 0.6;
    margin-bottom: 20px;
  }
  .modal-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px 20px;
  }
  .modal-prop label {
    display: block;
    font-size: 0.55rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 2px;
  }
  .modal-prop span {
    font-size: 0.8rem;
  }

  .modal-desc {
    margin-top: 16px;
    font-size: 0.65rem;
    line-height: 1.7;
    color: var(--muted);
    border-top: 1px solid var(--border);
    padding-top: 16px;
  }

  /* Search bar */
  .search-bar {
    display: flex;
    justify-content: center;
    margin-bottom: 16px;
  }
  .search-bar input {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'Space Mono', monospace;
    font-size: 0.75rem;
    padding: 8px 16px;
    width: 240px;
    outline: none;
    transition: border-color 0.2s;
  }
  .search-bar input:focus { border-color: var(--accent); }
  .search-bar input::placeholder { color: var(--muted); }

  .el.dimmed { opacity: 0.15; }
  .el.highlighted { opacity: 1 !important; }
</style>
</head>

    <div class="modal-desc" id="m-desc"></div>

</div>

// Grid positions: [atomicNumber, row, col]
// Row/col are 1-indexed. We reserve row 1 for period labels, col 1 for group labels.
// But we'll implement the standard layout directly.

// Standard PT layout: [atomicNum] => [gridRow, gridCol] (1-based, matching the PT grid)
// Period labels go in col 0, Group labels go in row 0.
// Actual element cells in rows 1-9 (period 1-7 + 2 rows for f-block)
// We'll use a 10-row × 18-col grid (rows 0=group labels, 1-7=periods, 8=gap, 9=lanthanum, 10=actinides)

function buildGrid() {
  const grid = document.getElementById('grid');
  const elByNum = {};
  ELEMENTS.forEach(e => elByNum[e[0]] = e);

  // Map: atomicNumber -> [row, col] (1-indexed in the 10×18 grid)
  // Row 1 = period 1, row 2 = period 2 ... row 7 = period 7
  // Row 8 = La/Ac separator row (empty, just labels)
  // Row 9 = lanthanides (57-71)
  // Row 10 = actinides (89-103)

  const pos = {};
  // Period 1
  pos[1]=[1,1]; pos[2]=[1,18];
  // Period 2
  for(let i=3;i<=4;i++) pos[i]=[2,i-2];
  for(let i=5;i<=10;i++) pos[i]=[2,i+8];
  // Period 3
  for(let i=11;i<=12;i++) pos[i]=[3,i-10];
  for(let i=13;i<=18;i++) pos[i]=[3,i-0];
  // Period 4
  for(let i=19;i<=36;i++) pos[i]=[4,i-18];
  // Period 5
  for(let i=37;i<=54;i++) pos[i]=[5,i-36];
  // Period 6
  for(let i=55;i<=56;i++) pos[i]=[6,i-54];
  pos[57]=[6,3]; // La marker
  for(let i=72;i<=86;i++) pos[i]=[6,i-68];
  // Period 7
  for(let i=87;i<=88;i++) pos[i]=[7,i-86];
  pos[89]=[7,3]; // Ac marker
  for(let i=104;i<=118;i++) pos[i]=[7,i-100];
  // Lanthanides row 9
  for(let i=58;i<=71;i++) pos[i]=[9,i-54];
  // Actinides row 10
  for(let i=90;i<=103;i++) pos[i]=[10,i-86];

  // Fill 10×18 grid
  const cells = {}; // "r,c" -> el data or null
  for(let [num, [r,c]] of Object.entries(pos)) {
    cells[`${r},${c}`] = parseInt(num);
  }

  // Render cells
  for(let r=1;r<=10;r++) {
    for(let c=1;c<=18;c++) {
      const key = `${r},${c}`;
      const num = cells[key];

      if(r===8) {
        // Gap row - just spacer
        const sp = document.createElement('div');
        sp.style.gridColumn = c;
        sp.style.gridRow = r;
        grid.appendChild(sp);
        continue;
      }

      if(num) {
        const el = elByNum[num];
        const [n,sym,name,mass,cat,period,group,config,en,state,mp,bp,desc] = el;
        const div = document.createElement('div');
        div.className = `el ${CATEGORIES[cat].css}`;
        div.style.gridColumn = c;
        div.style.gridRow = r;
        div.innerHTML = `<span class="num">${n}</span><span class="sym">${sym}</span><span class="name">${name.length>9?name.slice(0,8)+'…':name}</span>`;
        div.dataset.num = n;
        div.addEventListener('click', () => openModal(el));
        grid.appendChild(div);
      } else {
        // Special placeholders for La/Ac in row 6,7 col 3
        if((r===6||r===7) && c===3) {
          const ph = document.createElement('div');
          ph.className = 'placeholder';
          ph.style.gridColumn = c;
          ph.style.gridRow = r;
          ph.textContent = r===6 ? '57-71' : '89-103';
          grid.appendChild(ph);
        } else {
          const sp = document.createElement('div');
          sp.style.gridColumn = c;
          sp.style.gridRow = r;
          grid.appendChild(sp);
        }
      }
    }
  }
}

function openModal(el) {
  const [n,sym,name,mass,cat,period,group,config,en,state,mp,bp,desc] = el;
  const catData = CATEGORIES[cat];
  document.getElementById('m-sym').textContent = sym;
  document.getElementById('m-sym').style.color = getComputedStyle(document.documentElement).getPropertyValue(`--${catData.css}`);
  document.getElementById('m-num').textContent = `Atomic Number ${n}`;
  document.getElementById('m-name').textContent = name;
  document.getElementById('m-cat').textContent = catData.label;
  document.getElementById('m-mass').textContent = mass + ' u';
  document.getElementById('m-period').textContent = period || '—';
  document.getElementById('m-group').textContent = group || '—';
  document.getElementById('m-config').textContent = config;
  document.getElementById('m-en').textContent = en != null ? en + ' (Pauling)' : '—';
  document.getElementById('m-state').textContent = state || '—';
  document.getElementById('m-mp').textContent = mp ? mp + ' K' : '—';
  document.getElementById('m-bp').textContent = bp ? bp + ' K' : '—';
  document.getElementById('m-desc').textContent = desc;
  document.getElementById('modal-overlay').classList.add('open');
}

function buildLegend() {
  const legend = document.getElementById('legend');
  Object.entries(CATEGORIES).forEach(([key, {label, css}]) => {
    const item = document.createElement('div');
    item.className = 'legend-item';
    item.dataset.cat = css;
    item.innerHTML = `<div class="legend-dot" style="background:var(--${css})"></div>${label}`;
    item.addEventListener('click', () => filterByCategory(css));
    legend.appendChild(item);
  });
}

let activeFilter = null;
function filterByCategory(css) {
  const allEls = document.querySelectorAll('.el');
  if(activeFilter === css) {
    activeFilter = null;
    allEls.forEach(e => e.classList.remove('dimmed','highlighted'));
    return;
  }
  activeFilter = css;
  allEls.forEach(e => {
    if(e.classList.contains(css)) {
      e.classList.remove('dimmed');
      e.classList.add('highlighted');
    } else {
      e.classList.add('dimmed');
      e.classList.remove('highlighted');
    }
  });
}

// Search
document.getElementById('search').addEventListener('input', function() {
  const q = this.value.toLowerCase().trim();
  const allEls = document.querySelectorAll('.el');
  if(!q) {
    activeFilter = null;
    allEls.forEach(e => e.classList.remove('dimmed','highlighted'));
    return;
  }
  allEls.forEach(e => {
    const num = parseInt(e.dataset.num);
    const el = ELEMENTS[num-1];
    const [n,sym,name] = el;
    const match = name.toLowerCase().includes(q) || sym.toLowerCase().includes(q) || String(n).includes(q);
    if(match) {
      e.classList.remove('dimmed');
      e.classList.add('highlighted');
    } else {
      e.classList.add('dimmed');
      e.classList.remove('highlighted');
    }
  });
});

document.getElementById('modal-close').addEventListener('click', () => {
  document.getElementById('modal-overlay').classList.remove('open');
});
document.getElementById('modal-overlay').addEventListener('click', (e) => {
  if(e.target === document.getElementById('modal-overlay'))
    document.getElementById('modal-overlay').classList.remove('open');
});

buildGrid();
buildLegend();
</script>
